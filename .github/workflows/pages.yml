name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Swift system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install Swiftly
        shell: bash
        run: |
          set -euo pipefail
          curl -O "https://download.swift.org/swiftly/linux/swiftly-1.1.2-$(uname -m).tar.gz"
          tar -zxf "swiftly-1.1.2-$(uname -m).tar.gz"
          ./swiftly init --assume-yes --skip-install --no-modify-profile
          echo "$HOME/.local/share/swiftly/bin" >> "$GITHUB_PATH"

      - name: Install Swift WebAssembly toolchain
        shell: bash
        run: |
          set -euo pipefail
          source "$HOME/.local/share/swiftly/env.sh"
          swiftly install 6.3.2 --use --assume-yes
          hash -r
          swift sdk install https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c
          swift --version
          swift sdk list

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          source "$HOME/.local/share/swiftly/env.sh"
          swift package resolve
          npm ci

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          source "$HOME/.local/share/swiftly/env.sh"
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
